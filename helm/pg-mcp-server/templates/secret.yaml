{{/* PostgreSQL password secret */}}
{{- if not .Values.postgresql.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg-mcp-server.fullname" . }}-pg-credentials
  labels:
    {{- include "pg-mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  password: {{ .Values.postgresql.password | quote }}
{{- end }}
---
---
{{/* Auth token secret (only if token set inline and no existingSecret) */}}
{{- if and (not .Values.auth.existingSecret) .Values.auth.token }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg-mcp-server.fullname" . }}-auth
  labels:
    {{- include "pg-mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ .Values.auth.token | quote }}
{{- end }}
---
{{/* Inline TLS cert/key for the HTTPS server (only if not using existingSecret) */}}
{{- if and (not .Values.tls.existingSecret) .Values.tls.cert .Values.tls.key }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pg-mcp-server.fullname" . }}-tls
  labels:
    {{- include "pg-mcp-server.labels" . | nindent 4 }}
type: kubernetes.io/tls
data:
  tls.crt: {{ .Values.tls.cert }}
  tls.key: {{ .Values.tls.key }}
{{- end }}
