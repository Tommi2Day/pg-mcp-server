services:
  postgres-test:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-testdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-testdb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - mcp-net

  pg-mcp-server:
    build: .
    image: pg-mcp-server:latest
    ports:
      - "${MCP_PORT:-3000}:3000"
    depends_on:
      postgres-test:
        condition: service_healthy
    environment:
      TRANSPORT: http
      PORT: 3000

      # ── TLS (HTTPS) ───────────────────────────────────────────────────────
      # false → plain HTTP (default)
      # true  → HTTPS (requires a cert volume mounted at /certs)
      TLS_ENABLED: "${TLS_ENABLED:-false}"
      TLS_CERT_FILE: /certs/tls.crt
      TLS_KEY_FILE:  /certs/tls.key
      # TLS_CA_FILE: /certs/client-ca.crt
      # TLS_SAN: "${TLS_SAN:-}"

      # ── Authentication ────────────────────────────────────────────────────
      # Bearer token for /mcp and /admin/tokens (empty = auth disabled)
      # Generate with: openssl rand -hex 32
      AUTH_TOKEN: "${AUTH_TOKEN:-}"

      # ── Token store ───────────────────────────────────────────────────────
      TOKENS_FILE: /data/tokens.json

      # ── PostgreSQL (default / admin connection) ───────────────────────────
      PG_HOST: "${PG_HOST:-postgres-test}"
      PG_PORT: "${PG_PORT:-5432}"
      PG_DATABASE: "${PG_DATABASE:-testdb}"
      PG_USER: "${PG_USER:-postgres}"
      PG_PASSWORD: "${PG_PASSWORD:-postgres}"
      # PG_SSL: false | true | verify
      PG_SSL: "${PG_SSL:-false}"
      # PG_SSL_CA_FILE: /certs/pg-ca.crt

    volumes:
      - mcp-data:/data               # persist token store
      # - ./certs:/certs:ro          # uncomment when TLS_ENABLED=true

    networks:
      - mcp-net

    restart: unless-stopped

networks:
  mcp-net:
    driver: bridge

volumes:
  mcp-data:
